<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JournaLife</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/main.mjs" type="module"></script>
</head>

<body>
    <main>

        <header>
            <p>Header</p>
        </header>

        <div class="main-wrapper">
            <h1 id="day-display">Day Date</h1>
            <h2 id="month-year-display">Month - Year</h2>
            <div class="quotes-wrapper">
                <p class="quote">Lorem ipsum dolor sit amet consectetur adipisicing elit. Sunt vitae maiores blanditiis.
                    Cupiditate, dolor eos? - Jhon Doe</p>
            </div>
            <div class="entry-wrapper">
                <p class="entry"></p>

            </div>
            <button id="edit-note-btn">Edit</button>
            <button id="save-note-btn">Save</button>
            <div class="navigation-btns-wrapper">
                <button id="prev-note-btn">⟪</button>
                <button id="next-note-btn">⟫</button>
            </div>
        </div>


    </main>
</body>

</html>
